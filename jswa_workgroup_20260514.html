function project(){return state.projects.find(p=>p.id===activeProjectId)||state.projects[0]}
function loadState(){let saved={};try{saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')||{}}catch(e){}const projects=DEFAULT_PROJECTS.map(p=>{const old=(saved.projects||[]).find(x=>x.id===p.id)||{};return {...p,...old,docsDone:Array.isArray(old.docsDone)?old.docsDone:(DEFAULT_DONE[p.id]||[])};});return {projects,activeProjectId:saved.activeProjectId,lastCopy:saved.lastCopy||'尚未复制'};}
function saveState(){state.activeProjectId=activeProjectId;try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}}
function docsUntil(stage){return DOCS.filter(d=>stageIndex(d.stage)<=stageIndex(stage))}
function requiredUntil(stage){return docsUntil(stage).filter(d=>d.req)}
function missingRequired(p){return requiredUntil(p.stage).filter(d=>!(p.docsDone||[]).includes(d.id))}
function materialProgress(p){const req=requiredUntil(p.stage);if(!req.length)return 100;return Math.round(req.filter(d=>(p.docsDone||[]).includes(d.id)).length/req.length*100)}
function approvalAge(p){return daysSince(p.approvedDate)}
function planOverdue(p){return p.planEnd && dateDiff(p.planEnd)<0}
function commentStatusText(p){return p.commentDraftSubmitted?'已上报/意见征集中':'未上报征求意见稿'}
function riskLevel(p){const days=dateDiff(p.nextDue),miss=missingRequired(p).length,pct=materialProgress(p),age=approvalAge(p);if((!p.commentDraftSubmitted&&age>=180)||(!p.commentDraftSubmitted&&planOverdue(p))||days<0||miss>=4||pct<55)return 'red';if((!p.commentDraftSubmitted&&age>=120)||days<=5||miss>=2||pct<80)return 'amber';return 'green'}
function riskText(p){return {red:'红色风险',amber:'黄色提醒',green:'正常推进'}[riskLevel(p)]}
function ownerText(p){return `${p.tracker?.name||''}（${p.tracker?.org||''}，${p.tracker?.phone||''}）`}
function tutorText(p){return p.tutor?`${p.tutor.name}（${p.tutor.org}，${p.tutor.phone}）`:'未单列，按项目建设责任人跟踪'}
function riskScore(p){return {red:3,amber:2,green:1}[riskLevel(p)]||0}
function render(){renderHeader();renderTodo();renderProjects();renderRules();renderAi();renderPerf();saveState();}
function renderHeader(){const notSubmitted=state.projects.filter(p=>!p.commentDraftSubmitted).length;const risk=state.projects.filter(p=>riskLevel(p)!=='green').length;const due=state.projects.filter(p=>dateDiff(p.nextDue)<=7).length;const avg=Math.round(state.projects.reduce((s,p)=>s+materialProgress(p),0)/state.projects.length);$('kpis').innerHTML=`<div class="kpi"><b>${state.projects.length}</b><span>在建项目</span></div><div class="kpi"><b>${notSubmitted}</b><span>未上报</span></div><div class="kpi"><b>${risk}</b><span>风险提醒</span></div><div class="kpi"><b>${avg}%</b><span>材料率</span></div>`;$('quickLine').innerHTML=`<button class="quick" onclick="copyCentralReminder()">集中催办</button><button class="quick" onclick="copyOwnerList()">责任清单</button><button class="quick" onclick="copyMissingList()">缺项清单</button><button class="quick" onclick="copyPromptPack()">提示词包</button>`;}
function switchTab(tab){currentTab=tab;document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));({todo:'secTodo',projects:'secProjects',rules:'secRules',ai:'secAi',perf:'secPerf'}[tab]&&$(({todo:'secTodo',projects:'secProjects',rules:'secRules',ai:'secAi',perf:'secPerf'}[tab])).classList.add('active'));document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.tab===tab));window.scrollTo({top:0,behavior:'smooth'});}
function setActiveProject(id,tab){activeProjectId=id;saveState();render();if(tab)switchTab(tab);else toast('已选择项目')}
function renderTodo(){const top=[...state.projects].sort((a,b)=>riskScore(b)-riskScore(a)||dateDiff(a.nextDue)-dateDiff(b.nextDue)).slice(0,5);const notSubmitted=state.projects.filter(p=>!p.commentDraftSubmitted);const sponge=state.projects.filter(p=>p.type==='海绵城市');$('secTodo').innerHTML=`
  <div class="card"><div class="between"><div><div class="h2">当前重点提醒</div><div class="small muted">围绕2025年8月8日立项批次，重点抓征求意见稿上报、责任链和材料闭环。</div></div><span class="pill red">${notSubmitted.length}项未上报</span></div>
    <div class="red-box" style="margin-top:10px">8个项目均按 <b>2025-08-08</b> 立项批次管理。目前仅 <b>《水泵房减振降噪技术规范》</b> 已在意见征集中，其余 <b>${notSubmitted.length}</b> 个项目尚未上报征求意见稿。建议由项目建设责任人/项目负责人牵头，本周形成上报时间、责任人和缺项材料清单。</div>
    <div class="notice" style="margin-top:10px"><b>责任关系口径：</b>普通供水项目以“项目建设责任人/项目跟踪人（标委会工作组成员）”推进；海绵联盟4个项目以“海绵工作组项目负责人/项目跟踪人”牵头，并由“标委会工作组成员”作项目辅导。</div>
    <div class="grid3" style="margin-top:10px"><div class="perf"><div class="tiny muted">海绵双责任链</div><b>${sponge.length}项</b></div><div class="perf"><div class="tiny muted">意见征集中</div><b>${state.projects.filter(p=>p.commentDraftSubmitted).length}项</b></div><div class="perf"><div class="tiny muted">今日风险</div><b>${state.projects.filter(p=>riskLevel(p)!=='green').length}项</b></div></div>
    <div class="actions"><button class="btn primary" onclick="copyCentralReminder()">生成集中催办</button><button class="btn blue" onclick="projectFilter='未上报';renderProjects();switchTab('projects')">查看未上报</button><button class="btn ghost" onclick="copyOwnerList()">导出责任清单</button></div>
  </div>
  <div class="card"><div class="between"><div><div class="h2">今日优先处理</div><div class="small muted">按风险、计划期、缺项材料自动排序。</div></div><button class="btn smallbtn primary" onclick="copyDailyBrief()">复制日报</button></div>${top.map(projectMiniHTML).join('')}</div>
  <div class="card"><div class="h2">海绵项目责任链</div>${sponge.map(p=>`<div class="statline" onclick="setActiveProject('${p.id}','projects')"><div><div class="h4">${esc(p.title)}</div><div class="tiny muted">项目负责人：${esc(ownerText(p))}<br>项目辅导：${esc(tutorText(p))}</div></div><span class="pill ${riskLevel(p)}">${commentStatusText(p)}</span></div>`).join('')}</div>`}
function projectMiniHTML(p){const days=dateDiff(p.nextDue);return `<div class="statline" onclick="setActiveProject('${p.id}','projects')"><div><div class="h4">${esc(p.title)}</div><div class="tiny muted">${stageName(p.stage)}｜${commentStatusText(p)}｜${p.tracker?.name||''}负责｜${days<0?'逾期'+Math.abs(days)+'天':'剩余'+days+'天'}</div></div><span class="pill ${riskLevel(p)}">缺${missingRequired(p).length}</span></div>`}
function renderProjects(){const types=['全部','未上报','征求意见中','海绵项目','普通供水','红色风险','黄色提醒','正常推进'];$('secProjects').innerHTML=`
  <div class="search"><input id="projectSearch" placeholder="搜索项目、单位、责任人、手机号" oninput="renderProjectList()"></div>
  <div class="chips">${types.map(t=>`<button class="chip ${projectFilter===t?'active':''}" onclick="projectFilter='${esc(t)}';renderProjects()">${esc(t)}</button>`).join('')}</div>
  <div class="select-row"><select class="input" onchange="setActiveProject(this.value)">${state.projects.map(p=>`<option value="${p.id}" ${p.id===activeProjectId?'selected':''}>${esc(p.seq+'. '+p.title.replace(/[《》]/g,'').slice(0,24))}</option>`).join('')}</select><select class="input" onchange="setProjectStage(this.value)">${STAGES.map(s=>`<option value="${s.id}" ${s.id===project().stage?'selected':''}>当前阶段：${s.name}</option>`).join('')}</select><select class="input" onchange="setCommentStatus(this.value)"><option value="not" ${project().commentDraftSubmitted?'':'selected'}>征求意见稿：未上报</option><option value="yes" ${project().commentDraftSubmitted?'selected':''}>征求意见稿：已上报/意见征集中</option></select><input class="input" type="date" value="${project().nextDue||todayISO()}" onchange="setNextDue(this.value)"></div>
  <div id="projectDetail"></div><div id="projectList"></div>`;renderProjectDetail();renderProjectList();}
function setProjectStage(stage){const p=project();p.stage=stage;saveState();render();toast('阶段已调整：'+stageName(stage));}
function setNextDue(v){const p=project();p.nextDue=v;saveState();render();toast('下一节点日期已更新');}
function setCommentStatus(v){const p=project();p.commentDraftSubmitted=(v==='yes');if(p.commentDraftSubmitted){p.stage=stageIndex(p.stage)<stageIndex('comment')?'comment':p.stage;p.docsDone=[...new Set([...(p.docsDone||[]),'C01','C02','C03','D01'])];}else{p.stage=stageIndex(p.stage)>=stageIndex('comment')?'draft':p.stage;p.docsDone=(p.docsDone||[]).filter(id=>!['C01','D01','D02','D03','D04'].includes(id));}saveState();render();toast('征求意见稿状态已更新');}
function renderProjectDetail(){const p=project();const tabs=['概览','时间','责任','材料'];$('projectDetail').innerHTML=`<div class="card"><div class="between"><div><div class="h2">${esc(p.title)}</div><div class="small muted">主编单位：${esc(p.leadOrg)}｜主编人：${esc(p.leadPerson)}</div></div><span class="pill ${riskLevel(p)}">${riskText(p)}</span></div><div class="seg">${tabs.map(t=>`<button class="${projectMode===t?'active':''}" onclick="projectMode='${t}';renderProjectDetail()">${t}</button>`).join('')}</div>${projectDetailBody(p)}<div class="actions"><button class="btn primary" onclick="copyReminder('${p.id}')">复制催办</button><button class="btn blue" onclick="setActiveProject('${p.id}','rules')">规则体检</button><button class="btn ghost" onclick="exportProjectText('${p.id}')">项目卡</button></div></div>`;}
function projectDetailBody(p){if(projectMode==='时间')return timeHTML(p);if(projectMode==='责任')return ownerHTML(p);if(projectMode==='材料')return materialHTML(p);return overviewHTML(p)}
function overviewHTML(p){const pct=materialProgress(p),days=dateDiff(p.nextDue);return `<div class="grid2"><div class="perf"><div class="tiny muted">申请时间</div><b>${esc(p.applyDate)}</b></div><div class="perf"><div class="tiny muted">立项批次</div><b>${esc(p.approvedDate)}</b></div><div class="perf"><div class="tiny muted">计划周期</div><b>${esc(p.plan)}</b></div><div class="perf"><div class="tiny muted">当前阶段</div><b>${stageName(p.stage)}</b></div></div><div class="meta"><span class="pill ${p.commentDraftSubmitted?'green':'red'}">${commentStatusText(p)}</span><span class="pill blue">专家组${p.expertCount}人</span><span class="pill ${days<=5?'amber':'gray'}">${days<0?'节点逾期'+Math.abs(days)+'天':'节点剩余'+days+'天'}</span></div><div class="row" style="margin-top:10px"><div class="progress grow"><div class="bar ${pct<60?'red':pct<80?'amber':''}" style="width:${pct}%"></div></div><b class="small">${pct}%</b></div><div class="warning-box" style="margin-top:10px"><b>下一动作：</b>${esc(p.nextAction)}</div>`}
function timeHTML(p){const nodes=[['申请时间',p.applyDate,'done'],['调研时间',p.surveyDate,'done'],['立项评审会',p.reviewMeetingDate,'done'],['立项批次',p.approvedDate,'done'],['计划结束',p.planEnd,planOverdue(p)?'risk':'now'],['下一节点',p.nextDue,dateDiff(p.nextDue)<=5?'risk':'now']];return `<div class="timeline">${nodes.map(n=>`<div class="node ${n[2]}"><div class="h4">${n[0]}：${esc(n[1]||'未填')}</div><div class="tiny muted">${n[0]==='立项评审会'?'专家组意见：'+esc(p.expertOpinion):n[0]==='计划结束'?'计划周期：'+esc(p.plan):''}</div></div>`).join('')}</div>`}
function ownerHTML(p){const contact=p.contact?`<div class="statline"><div><div class="h4">${esc(p.contact.label)}</div><div class="tiny muted">${esc(p.contact.name)}｜${esc(p.contact.org)}｜${esc(p.contact.phone)}</div></div><span class="pill gray">联系</span></div>`:'';const tutor=p.tutor?`<div class="statline"><div><div class="h4">${esc(p.tutor.label)}</div><div class="tiny muted">${esc(p.tutor.name)}｜${esc(p.tutor.org)}｜${esc(p.tutor.phone)}</div></div><span class="pill purple">辅导</span></div>`:`<div class="statline"><div><div class="h4">项目辅导</div><div class="tiny muted">普通供水项目未单列辅导人，由项目建设责任人负责节点提醒和材料闭环。</div></div><span class="pill gray">未单列</span></div>`;return `<div class="notice"><b>责任链口径：</b>${p.type==='海绵城市'?'海绵工作组成员为项目负责人/项目跟踪人，标委会工作组成员承担项目辅导。':'项目跟踪人为项目建设责任人，属于标委会工作组成员，负责对主编单位和起草人进行节点提醒、材料闭环和质量提示。'}</div><div style="margin-top:10px">${contact}<div class="statline"><div><div class="h4">${esc(p.tracker.label)}</div><div class="tiny muted">${esc(p.tracker.name)}｜${esc(p.tracker.org)}｜${esc(p.tracker.phone)}</div></div><span class="pill teal">负责</span></div>${tutor}<div class="statline"><div><div class="h4">专家组组长</div><div class="tiny muted">${esc(p.expertLead)}｜专家组${p.expertCount}人｜${esc(p.expertOpinion)}</div></div><span class="pill blue">专家</span></div></div>`}
function materialHTML(p){return `<div class="chips"><button class="chip ${docFilter==='缺项'?'active':''}" onclick="docFilter='缺项';renderProjectDetail()">缺项</button><button class="chip ${docFilter==='当前阶段'?'active':''}" onclick="docFilter='当前阶段';renderProjectDetail()">当前阶段</button><button class="chip ${docFilter==='全部材料'?'active':''}" onclick="docFilter='全部材料';renderProjectDetail()">全部材料</button></div>${docsForRender(p,docFilter).map(d=>docHTML(d,p)).join('')||'<div class="empty">当前无缺项</div>'}`}
function docsForRender(p,filter){let arr=docsUntil(p.stage);if(filter==='缺项')arr=arr.filter(d=>d.req&&!(p.docsDone||[]).includes(d.id));if(filter==='全部材料')arr=DOCS;return arr;}
function docHTML(d,p){const done=(p.docsDone||[]).includes(d.id);return `<div class="doc ${done?'done':''} ${d.req?'required':''}" onclick="toggleDoc('${p.id}','${d.id}')"><div class="check"></div><div class="grow"><div class="name">${esc(d.name)}</div><div class="tip">${stageName(d.stage)}｜${esc(d.tip)}</div></div><span class="pill ${done?'green':'gray'}">${done?'已归档':'待补'}</span></div>`}
function toggleDoc(pid,docid){const p=state.projects.find(x=>x.id===pid);p.docsDone=p.docsDone||[];p.docsDone=p.docsDone.includes(docid)?p.docsDone.filter(x=>x!==docid):[...p.docsDone,docid];saveState();render();toast('材料状态已更新');}
function renderProjectList(){const el=$('projectList');if(!el)return;const q=($('projectSearch')?.value||'').trim().toLowerCase();let arr=state.projects.filter(filterProjectMatch).filter(p=>!q||[p.title,p.type,p.leadOrg,p.leadPerson,p.tracker?.name,p.tracker?.org,p.tracker?.phone,p.tutor?.name,p.tutor?.org,p.tutor?.phone,(p.tags||[]).join(' ')].join(' ').toLowerCase().includes(q)).sort((a,b)=>riskScore(b)-riskScore(a)||dateDiff(a.nextDue)-dateDiff(b.nextDue));el.innerHTML=`<div class="card"><div class="between"><div class="h2">项目列表</div><span class="pill gray">${arr.length}项</span></div>${arr.map(projectCardHTML).join('')||'<div class="empty">未找到匹配项目</div>'}</div>`;}
function filterProjectMatch(p){if(projectFilter==='全部')return true;if(projectFilter==='未上报')return !p.commentDraftSubmitted;if(projectFilter==='征求意见中')return p.commentDraftSubmitted;if(projectFilter==='海绵项目')return p.type==='海绵城市';if(projectFilter==='普通供水')return p.type!=='海绵城市';if(projectFilter==='红色风险')return riskLevel(p)==='red';if(projectFilter==='黄色提醒')return riskLevel(p)==='amber';if(projectFilter==='正常推进')return riskLevel(p)==='green';return true;}
function projectCardHTML(p){const pct=materialProgress(p),miss=missingRequired(p).length,days=dateDiff(p.nextDue);return `<div class="project-card" style="padding:11px 0;border-top:1px dashed #e5e7eb"><div class="between"><div class="name">${esc(p.title)}</div><span class="pill ${riskLevel(p)}">${riskText(p)}</span></div><div class="meta"><span class="pill blue">${esc(p.type)}</span><span class="pill gray">${stageName(p.stage)}</span><span class="pill ${p.commentDraftSubmitted?'green':'red'}">${commentStatusText(p)}</span><span class="pill ${days<=5?'amber':'gray'}">${days<0?'逾期'+Math.abs(days)+'天':'剩余'+days+'天'}</span></div><div class="small muted" style="margin-top:8px">立项：${esc(p.approvedDate)}｜计划：${esc(p.plan)}<br>${esc(p.tracker.label)}：${esc(ownerText(p))}${p.tutor?`<br>${esc(p.tutor.label)}：${esc(tutorText(p))}`:''}</div><div class="row" style="margin-top:10px"><div class="progress grow"><div class="bar ${pct<60?'red':pct<80?'amber':''}" style="width:${pct}%"></div></div><b class="small">${pct}%</b></div><div class="actions"><button class="btn primary" onclick="setActiveProject('${p.id}','rules')">体检</button><button class="btn ghost" onclick="copyReminder('${p.id}')">催办</button><button class="btn ghost" onclick="setActiveProject('${p.id}','projects')">打开</button></div></div>`}
function renderRules(){const p=project();$('secRules').innerHTML=`<div class="card"><div class="between"><div><div class="h2">规则引擎体检</div><div class="small muted">${esc(p.title)}</div></div><span class="pill ${riskLevel(p)}">${riskText(p)}</span></div>${rulesFor(p).map(ruleHTML).join('')}<div class="actions"><button class="btn primary" onclick="copyRuleBrief()">复制体检报告</button><button class="btn ghost" onclick="copyMissingList()">复制缺项清单</button></div></div><div class="card"><div class="between"><div class="h2">未上报项目清单</div><span class="pill red">${state.projects.filter(x=>!x.commentDraftSubmitted).length}项</span></div>${state.projects.filter(x=>!x.commentDraftSubmitted).map(x=>`<div class="statline" onclick="setActiveProject('${x.id}','projects')"><div><div class="h4">${esc(x.title)}</div><div class="tiny muted">责任人：${esc(x.tracker.name)}｜辅导：${x.tutor?esc(x.tutor.name):'未单列'}｜计划结束：${esc(x.planEnd)}</div></div><span class="pill ${riskLevel(x)}">缺${missingRequired(x).length}</span></div>`).join('')}</div><div class="card"><div class="between"><div class="h2">当前项目材料</div><span class="pill blue">${docsForRender(p,docFilter).length}项</span></div><div class="chips">${['缺项','当前阶段','全部材料'].map(f=>`<button class="chip ${docFilter===f?'active':''}" onclick="docFilter='${f}';renderRules()">${f}</button>`).join('')}</div>${docsForRender(p,docFilter).map(d=>docHTML(d,p)).join('')||'<div class="empty">当前无缺项</div>'}</div>`;}
function rulesFor(p){const miss=missingRequired(p),days=dateDiff(p.nextDue),pct=materialProgress(p),age=approvalAge(p),done=p.docsDone||[],arr=[];arr.push({level:p.commentDraftSubmitted?'ok':(age>=180?'bad':'warn'),title:'征求意见稿上报状态',msg:p.commentDraftSubmitted?'已标记为“已上报/意见征集中”，下一步重点是意见回收、意见汇总处理表和专家预审。':`项目于 ${p.approvedDate} 立项，至今已 ${age} 天，尚未上报征求意见稿；应明确上报日期、主编单位责任人和项目建设责任人复核动作。`});arr.push({level:!planOverdue(p)||p.commentDraftSubmitted?'ok':'bad',title:'计划周期校验',msg:planOverdue(p)?`计划结束时间为 ${p.planEnd}，已超过计划周期。${p.commentDraftSubmitted?'因已进入征求意见，应尽快形成意见处理和审查计划。':'尚未上报征求意见稿，建议纳入红色催办。'}`:`计划结束时间为 ${p.planEnd}，尚在计划周期内。`});arr.push({level:pct>=80?'ok':pct>=60?'warn':'bad',title:'材料完整率',msg:`当前阶段必备材料完成率 ${pct}%，缺 ${miss.length} 项：${miss.slice(0,4).map(d=>d.name).join('、')||'无'}。`});arr.push({level:days>=6?'ok':days>=0?'warn':'bad',title:'下一节点时限',msg:days<0?`下一节点已逾期 ${Math.abs(days)} 天，应立即形成催办和调整计划。`:`距离下一节点 ${days} 天，${days<=5?'建议提前锁定责任人和材料清单。':'时间相对充裕。'}`});arr.push({level:done.includes('A03')?'ok':'bad',title:'查新查重与协调性',msg:done.includes('A03')?'已有查新查重或现行标准比对记录。':'缺少查新查重/现行标准比对记录，立项与审查风险较高。'});if(p.type==='海绵城市')arr.push({level:p.tutor?'ok':'warn',title:'海绵项目双责任链',msg:p.tutor?`项目负责人/跟踪人：${ownerText(p)}；项目辅导：${tutorText(p)}。建议每周形成一次“负责人+辅导人”双签推进记录。`:'海绵项目应配置项目辅导人。'});return arr;}
function ruleHTML(r){return `<div class="rule ${r.level}"><div class="h4">${esc(r.title)}</div><div class="small">${esc(r.msg)}</div></div>`}
function renderAi(){const cats=['全部',...new Set(PROMPTS.map(p=>p.cat))];let arr=PROMPTS.filter(p=>promptFilter==='全部'||p.cat===promptFilter);$('secAi').innerHTML=`<div class="card"><div class="between"><div><div class="h2">AI 提示词工作包</div><div class="small muted">围绕责任链、节点催办、征求意见稿和绩效佐证。</div></div><button class="btn smallbtn primary" onclick="copyPromptPack()">整包复制</button></div><div class="chips">${cats.map(c=>`<button class="chip ${promptFilter===c?'active':''}" onclick="promptFilter='${esc(c)}';renderAi()">${esc(c)}</button>`).join('')}</div>${arr.map(promptHTML).join('')}</div>`}
function promptHTML(pr){return `<div class="prompt"><div class="between"><div><div class="h3">${esc(pr.title)}</div><span class="use-badge">${esc(pr.use)}｜${esc(pr.cat)}</span></div><button class="btn smallbtn primary" onclick="copyPrompt('${pr.id}')">复制</button></div><div class="body">${esc(promptText(pr))}</div></div>`}
function promptText(pr,p=project()){return pr.body.replaceAll('{{title}}',p.title).replaceAll('{{stageName}}',stageName(p.stage)).replaceAll('{{commentStatus}}',commentStatusText(p)).replaceAll('{{tracker}}',ownerText(p)).replaceAll('{{tutor}}',tutorText(p)).replaceAll('{{leadOrg}}',p.leadOrg)}
function copyPrompt(id){const pr=PROMPTS.find(p=>p.id===id);if(pr)safeCopy(promptText(pr),pr.title)}
function renderPerf(){const p=project(),metrics=performanceMetrics(p);$('secPerf').innerHTML=`<div class="card"><div class="between"><div><div class="h2">绩效佐证驾驶舱</div><div class="small muted">把年度考评证据前置到项目全过程。</div></div><button class="btn smallbtn primary" onclick="copyEvidenceBrief()">复制清单</button></div><div class="grid2">${metrics.map(m=>`<div class="perf"><div class="between"><b>${esc(m.name)}</b><span class="pill ${m.pct>=80?'green':m.pct>=60?'amber':'red'}">${m.pct}%</span></div><div class="row" style="margin-top:8px"><div class="progress grow"><div class="bar ${m.pct<60?'red':m.pct<80?'amber':''}" style="width:${m.pct}%"></div></div></div><div class="tiny muted" style="margin-top:6px">${m.done}/${m.total} 项证据</div></div>`).join('')}</div></div><div class="card"><div class="h2">项目绩效证据短板</div>${evidenceGapHTML(p)}<div class="actions"><button class="btn primary" onclick="copyEvidenceBrief()">复制佐证包</button><button class="btn ghost" onclick="copyWeeklyReport()">复制周报</button></div></div><div class="card"><div class="h2">年度考评沉淀建议</div><div class="grid2"><div class="green-box"><b>组织管理</b><br>保留编制组、会议、分工、回避和纪要。</div><div class="green-box"><b>过程规范</b><br>保留查新查重、征求意见、意见处理和发布留痕。</div><div class="green-box"><b>技术质量</b><br>保留验证数据、应用证明、专家审查和整改闭环。</div><div class="green-box"><b>应用推广</b><br>保留宣贯培训、实施反馈、采信证明和典型案例。</div></div></div>`}
function performanceMetrics(p){const cats=[{name:'组织管理',ids:['A01','B01','B02','E01']},{name:'过程规范',ids:['A03','C01','C02','D02','E03','F02']},{name:'技术质量',ids:['A02','A04','C04','E02','E04','F01']},{name:'应用推广',ids:['D03','F02','G01','G02','G03']}];return cats.map(c=>{const done=c.ids.filter(id=>(p.docsDone||[]).includes(id)).length;return {...c,done,total:c.ids.length,pct:Math.round(done/c.ids.length*100)}})}
function evidenceGapHTML(p){const miss=missingRequired(p);if(!miss.length)return '<div class="green-box">当前阶段必备材料已基本齐全。下一步重点是形成应用证明、平台留痕和宣贯反馈。</div>';return miss.slice(0,8).map(d=>`<div class="statline"><div><div class="h4">${esc(d.name)}</div><div class="tiny muted">${stageName(d.stage)}｜${esc(d.tip)}</div></div><span class="pill red">缺项</span></div>`).join('')}
function textProject(p){return `${p.seq}. ${p.title}\n申请时间：${p.applyDate}\n立项批次：${p.approvedDate}\n计划周期：${p.plan}\n当前阶段：${stageName(p.stage)}\n征求意见稿：${commentStatusText(p)}\n主编单位：${p.leadOrg}\n主编人：${p.leadPerson}\n${p.contact?`${p.contact.label}：${p.contact.name}｜${p.contact.org}｜${p.contact.phone}\n`:''}${p.tracker.label}：${p.tracker.name}｜${p.tracker.org}｜${p.tracker.phone}\n${p.tutor?`${p.tutor.label}：${p.tutor.name}｜${p.tutor.org}｜${p.tutor.phone}\n`:''}调研时间：${p.surveyDate}\n立项评审会议：${p.reviewMeetingDate}\n专家组组长：${p.expertLead}｜${p.expertCount}人｜${p.expertOpinion}\n材料完成率：${materialProgress(p)}%\n缺项：${missingRequired(p).map(d=>d.name).join('、')||'无'}\n下一动作：${p.nextAction}`}
function copyCentralReminder(){const arr=state.projects.filter(p=>!p.commentDraftSubmitted);const txt=`JSWA团标项目集中催办提醒（${nowText()}）\n\n8个项目均按2025-08-08立项批次管理。目前仅《水泵房减振降噪技术规范》已在意见征集中，其余${arr.length}个项目尚未上报征求意见稿。请各项目建设责任人/项目负责人牵头，主编单位配合，标委会辅导人员对海绵项目开展材料和规则校验。\n\n未上报项目：\n${arr.map(p=>`- ${p.title}\n  责任人/负责人：${ownerText(p)}\n  ${p.tutor?'项目辅导：'+tutorText(p)+'\n  ':''}计划周期：${p.plan}；缺项：${missingRequired(p).slice(0,4).map(d=>d.name).join('、')||'无'}\n  下一动作：${p.nextAction}`).join('\n')}\n\n建议：3日内反馈征求意见稿上报时间；7日内补齐编制说明、征求意见单位清单和技术验证/应用证明；形成可归档的催办记录和绩效佐证。`;safeCopy(txt,'集中催办提醒')}
function copyOwnerList(){const txt=`JSWA团标项目责任清单（${nowText()}）\n\n${state.projects.map(p=>`${p.seq}. ${p.title}\n主编单位：${p.leadOrg}\n主编人：${p.leadPerson}\n${p.contact?`${p.contact.label}：${p.contact.name}｜${p.contact.org}｜${p.contact.phone}\n`:''}${p.tracker.label}：${p.tracker.name}｜${p.tracker.org}｜${p.tracker.phone}\n${p.tutor?`${p.tutor.label}：${p.tutor.name}｜${p.tutor.org}｜${p.tutor.phone}\n`:''}当前状态：${stageName(p.stage)}｜${commentStatusText(p)}\n`).join('\n')}`;safeCopy(txt,'项目责任清单')}
function copyMissingList(){const txt=`JSWA团标项目缺项清单（${nowText()}）\n\n${state.projects.map(p=>`${p.seq}. ${p.title}\n状态：${stageName(p.stage)}｜${commentStatusText(p)}｜${riskText(p)}\n责任人：${ownerText(p)}${p.tutor?'\n辅导人：'+tutorText(p):''}\n缺项：${missingRequired(p).map(d=>d.name).join('、')||'无'}\n`).join('\n')}`;safeCopy(txt,'缺项清单')}
function copyDailyBrief(){const risk=state.projects.filter(p=>riskLevel(p)!=='green');const txt=`JSWA团标项目日报（${nowText()}）\n在建项目：${state.projects.length}项；未上报征求意见稿：${state.projects.filter(p=>!p.commentDraftSubmitted).length}项；意见征集中：${state.projects.filter(p=>p.commentDraftSubmitted).length}项；风险提醒：${risk.length}项。\n\n重点：${risk.map(p=>`${p.title}（${riskText(p)}，${p.tracker.name}负责）`).join('；')}\n\n本周建议：围绕未上报项目开展集中催办，明确上报时间、责任人、缺项材料和绩效佐证留痕。`;safeCopy(txt,'项目日报')}
function copyReminder(id){const p=state.projects.find(x=>x.id===id)||project();const txt=`项目催办提醒：${p.title}\n\n当前阶段：${stageName(p.stage)}\n征求意见稿：${commentStatusText(p)}\n立项批次：${p.approvedDate}\n计划周期：${p.plan}\n主编单位：${p.leadOrg}\n${p.tracker.label}：${ownerText(p)}\n${p.tutor?`${p.tutor.label}：${tutorText(p)}\n`:''}\n需补材料：${missingRequired(p).map(d=>d.name).join('、')||'当前阶段必备材料基本齐全'}\n下一动作：${p.nextAction}\n\n请主编单位和起草人按上述缺项清单抓紧完善，项目建设责任人/项目负责人负责节点跟踪，项目辅导人负责规则校验和绩效佐证提醒。`;safeCopy(txt,'项目催办提醒')}
function copyRuleBrief(){const p=project();const txt=`规则引擎体检报告：${p.title}\n时间：${nowText()}\n风险等级：${riskText(p)}\n\n${rulesFor(p).map(r=>`【${r.title}】${r.msg}`).join('\n')}\n\n项目责任人：${ownerText(p)}${p.tutor?'\n项目辅导：'+tutorText(p):''}`;safeCopy(txt,'规则体检报告')}
function copyPromptPack(){const txt=PROMPTS.map(pr=>`【${pr.title}】\n${promptText(pr)}`).join('\n\n');safeCopy(txt,'AI提示词包')}
function copyEvidenceBrief(){const p=project();const txt=`绩效佐证清单：${p.title}\n${performanceMetrics(p).map(m=>`${m.name}：${m.done}/${m.total}，${m.pct}%`).join('\n')}\n\n短板材料：${missingRequired(p).map(d=>d.name).join('、')||'无'}\n\n责任人：${ownerText(p)}${p.tutor?'\n项目辅导：'+tutorText(p):''}`;safeCopy(txt,'绩效佐证清单')}
function copyWeeklyReport(){const txt=`JSWA团标工作周报（${nowText()}）\n\n一、总体情况\n在建8项，意见征集中${state.projects.filter(p=>p.commentDraftSubmitted).length}项，未上报征求意见稿${state.projects.filter(p=>!p.commentDraftSubmitted).length}项。\n\n二、重点风险\n${state.projects.filter(p=>riskLevel(p)!=='green').map(p=>`- ${p.title}：${riskText(p)}，责任人${p.tracker.name}，${p.commentDraftSubmitted?'意见处理中':'征求意见稿未上报'}`).join('\n')}\n\n三、下周动作\n1. 集中催办未上报项目；2. 海绵项目落实负责人+辅导人双责任链；3. 补齐编制说明、征求意见单位清单、技术验证和绩效佐证。`;safeCopy(txt,'工作周报')}
function exportProjectText(id){const p=state.projects.find(x=>x.id===id)||project();safeCopy(textProject(p),'项目卡')}
function exportCSV(){const rows=[['序号','项目','申请时间','立项批次','计划周期','阶段','征求意见稿','主编单位','主编人','责任人/项目负责人','责任人单位','责任人电话','项目辅导','辅导单位','辅导电话','材料率','风险']].concat(state.projects.map(p=>[p.seq,p.title,p.applyDate,p.approvedDate,p.plan,stageName(p.stage),commentStatusText(p),p.leadOrg,p.leadPerson,p.tracker.name,p.tracker.org,p.tracker.phone,p.tutor?.name||'',p.tutor?.org||'',p.tutor?.phone||'',materialProgress(p)+'%',riskText(p)]));const csv=rows.map(r=>r.map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(',')).join('\n');downloadFile(csv,'jswa_团标项目进度表.csv','text/csv;charset=utf-8;');}
function exportJSON(){downloadFile(JSON.stringify(state.projects,null,2),'jswa_团标项目快照.json','application/json;charset=utf-8;')}
function downloadFile(content,name,type){const blob=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},500);toast('已生成导出文件')}
async function safeCopy(text,label){state.lastCopy=`${label}（${nowText()}）`;saveState();try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(text);toast('已复制：'+label);return}}catch(e){}try{const ta=document.createElement('textarea');ta.value=text;ta.setAttribute('readonly','');ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,ta.value.length);const ok=document.execCommand('copy');document.body.removeChild(ta);if(ok){toast('已复制：'+label);return}}catch(e){}openCopyModal(text,label)}
function openCopyModal(text,label){$('modalTitle').textContent='手动复制：'+label;$('modalBody').innerHTML=`<div class="notice">若浏览器限制自动复制，请长按下方文本框全选复制；也可点“系统分享”。</div><textarea class="textarea" id="copyText">${esc(text)}</textarea><div class="actions"><button class="btn primary" onclick="selectCopyText()">全选文本</button><button class="btn blue" onclick="shareCopyText()">系统分享</button><button class="btn ghost" onclick="closeModal()">完成</button></div>`;$('modal').classList.add('show');setTimeout(selectCopyText,80)}
function selectCopyText(){const t=$('copyText');if(t){t.focus();t.select();t.setSelectionRange(0,t.value.length);}}
function shareCopyText(){const t=$('copyText')?.value||'';if(navigator.share){navigator.share({text:t}).catch(()=>{})}else{toast('当前浏览器不支持系统分享')}}
function openHelp(){$('modalTitle').textContent='岗位使用说明';$('modalBody').innerHTML=`<div class="green-box"><b>使用路径：</b><br>1. 在“待办”看总体风险和集中催办。<br>2. 在“项目”设置当前阶段、征求意见稿状态和下一节点日期。<br>3. 在“规则”看缺项、计划期、责任链风险。<br>4. 在“AI提示词”复制催办、评审、意见处理和绩效佐证提示。<br>5. 在“绩效”沉淀年度考评证据。</div><div class="notice" style="margin-top:10px"><b>责任链口径：</b><br>普通供水项目：项目跟踪人即项目建设责任人，由标委会工作组成员承担。<br>海绵联盟项目：海绵工作组成员为项目负责人/项目跟踪人，标委会工作组成员承担项目辅导。</div><div class="source-note">本样机按您提供的“2025年度团标申报及专家评审概况”表格打样，内置数据可由Codex后续替换为真实接口或JSON。</div>`;$('modal').classList.add('show')}
function openExport(){$('modalTitle').textContent='导出与复制';$('modalBody').innerHTML=`<div class="actions"><button class="btn primary" onclick="copyDailyBrief()">复制日报</button><button class="btn primary" onclick="copyOwnerList()">复制责任清单</button><button class="btn primary" onclick="copyMissingList()">复制缺项清单</button><button class="btn blue" onclick="exportCSV()">导出CSV进度表</button><button class="btn blue" onclick="exportJSON()">导出JSON快照</button></div><div class="source-note">上次复制：${esc(state.lastCopy||'尚未复制')}</div>`;$('modal').classList.add('show')}
function closeModal(){$('modal').classList.remove('show')}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
window.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
render();
</script>
</body>
