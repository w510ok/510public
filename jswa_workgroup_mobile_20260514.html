<div class="app" id="app">
  <header class="hero">
    <div class="hero-card">
      <div class="hero-top">
        <div class="logo">水</div>
        <div class="grow">
          <div class="title">JSWA 团标工作组移动端</div>
          <div class="sub">项目跟踪 · 规则校验 · AI赋能 · 绩效佐证</div>
        </div>
        <div class="hero-actions">

        </div>
      </div>
      <div class="kpis">

        <div class="kpi"><b id="kpiTodo">0</b><span>待办</span></div>
        <div class="kpi"><b id="kpiRisk">0</b><span>风险</span></div>
        <div class="kpi"><b id="kpiProgress">0%</b><span>材料率</span></div>
      </div>
    </div>
  </header>

  <main class="content">
    <section id="sec-dashboard" class="section active">
      <div class="card flat">
        <div class="between"><div class="h2">今日工作台</div><span class="pill blue" id="todayText">2026-05-14</span></div>
        <div class="statline">
          <div class="stat"><b id="dashDueSoon">0</b><span>14天内节点</span></div>
          <div class="stat"><b id="dashMissing">0</b><span>关键缺项</span></div>
          <div class="stat"><b id="dashRed">0</b><span>红色风险</span></div>
        </div>
      </div>
      <div class="card">
        <div class="between"><div class="h2">优先提醒</div><button class="btn smallbtn ghost" onclick="copyDailyBrief()">复制日报</button></div>
        <div id="priorityList"></div>
      </div>
      <div class="card">
        <div class="h2">快捷动作</div>
        <div class="actions">
          <button class="btn primary" onclick="setTab('projects')">查看项目</button>
          <button class="btn blue" onclick="openSheet('remind')">生成催办</button>
          <button class="btn ghost" onclick="setTab('rules')">规则体检</button>
          <button class="btn ghost" onclick="setTab('prompts')">AI提示词</button>
        </div>
        <div class="source-note">定位：辅助工作组成员组织编制单位和起草人，不替代协会正式审批、专家审查和制度流程。</div>
      </div>
    </section>

    <section id="sec-projects" class="section">
      <div class="search"><input id="projectSearch" placeholder="搜索项目、单位、负责人、类别…" oninput="renderProjects()" /></div>
      <div class="chips" id="projectChips"></div>
      <div id="projectList"></div>
    </section>

    <section id="sec-detail" class="section">
      <div id="detailRoot"></div>
    </section>

    <section id="sec-rules" class="section">
      <div class="card">
        <div class="between"><div><div class="h2">规则引擎体检</div><div class="small muted">按当前选中项目自动判断“已满足 / 待补充 / 风险”。</div></div><button class="btn smallbtn primary" onclick="openSheet('remind')">生成提醒</button></div>
        <div class="divider"></div>
        <div id="rulesProjectMini"></div>
      </div>
      <div id="ruleList"></div>
    </section>

    <section id="sec-prompts" class="section">
      <div class="card">
        <div class="h2">AI提示词库</div>
        <div class="small muted">点击复制后，可直接粘贴到 ChatGPT / Codex / 本地大模型。提示词会自动带入当前项目。</div>
        <div class="doc-filter" id="promptFilters"></div>
      </div>
      <div id="promptList"></div>
    </section>

    <section id="sec-performance" class="section">
      <div class="card">
        <div class="between"><div><div class="h2">绩效佐证驾驶舱</div><div class="small muted">把年度考评证据前置到项目全过程。</div></div><button class="btn smallbtn ghost" onclick="copyEvidenceBrief()">复制清单</button></div>
      </div>
      <div class="perf-grid" id="perfGrid"></div>
      <div class="card">
        <div class="h3">证据闭环建议</div>
        <div id="evidenceAdvice" class="small"></div>
      </div>
    </section>
  </main>
</div>

<nav class="nav">
  <div class="nav-inner">
    <button id="nav-dashboard" class="active" onclick="setTab('dashboard')"><span class="ico">◎</span><span>待办</span></button>
    <button id="nav-projects" onclick="setTab('projects')"><span class="ico">▣</span><span>项目</span></button>
    <button id="nav-rules" onclick="setTab('rules')"><span class="ico">⚙</span><span>规则</span></button>
    <button id="nav-prompts" onclick="setTab('prompts')"><span class="ico">AI</span><span>提示词</span></button>
    <button id="nav-performance" onclick="setTab('performance')"><span class="ico">◇</span><span>绩效</span></button>
  </div>
</nav>

<div class="modal" id="modal" onclick="closeSheetOnBackdrop(event)">

    <div class="handle"></div>

</div>

let state = loadState();
let activeTab = 'dashboard';
let activeProjectId = state.activeProjectId || PROJECTS_INIT[0].id;
let activeFilter = '全部';
let docStageFilter = '全部';
let promptRoleFilter = '全部';

function loadState(){
  const fresh = {projects: PROJECTS_INIT, activeProjectId: PROJECTS_INIT[0].id, updatedAt: new Date().toISOString()};
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return fresh;
    const saved = JSON.parse(raw);
    // merge latest demo data with user's checkbox state
    const byId = Object.fromEntries((saved.projects||[]).map(p=>[p.id,p]));
    fresh.projects = PROJECTS_INIT.map(p => ({...p, docsDone: byId[p.id]?.docsDone || p.docsDone, userNotes: byId[p.id]?.userNotes || ''}));
    fresh.activeProjectId = byId[saved.activeProjectId] ? saved.activeProjectId : fresh.activeProjectId;
    return fresh;
  }catch(e){ return fresh; }
}
function saveState(){
  state.activeProjectId = activeProjectId;
  state.updatedAt = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function $(id){return document.getElementById(id)}
function project(){return state.projects.find(p=>p.id===activeProjectId) || state.projects[0]}
function stageIndex(key){return STAGES.findIndex(s=>s.key===key)}
function stageName(key){return STAGES.find(s=>s.key===key)?.name || key}
function daysUntil(dateStr){const d=new Date(dateStr+'T00:00:00'); return Math.ceil((d-TODAY)/86400000)}
function esc(s){return String(s??'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function docById(id){return DOCS.find(d=>d.id===id)}
function docsForProject(p){return DOCS.map(d => ({...d, done:(p.docsDone||[]).includes(d.id)}))}
function materialProgress(p){const req=DOCS.filter(d=>d.required); const done=req.filter(d=>(p.docsDone||[]).includes(d.id)); return Math.round(done.length/req.length*100)}
function missingRequired(p){return DOCS.filter(d=>d.required && !(p.docsDone||[]).includes(d.id))}
function criticalMissing(p){const idx=stageIndex(p.stage); return missingRequired(p).filter(d=>stageIndex(d.stage)<=idx).length}
function riskLevel(p){const days=daysUntil(p.nextDue); const crit=criticalMissing(p); if(days<0 || crit>=3) return 'red'; if(days<=14 || crit>0) return 'amber'; return 'green'}
function riskText(p){const r=riskLevel(p); return r==='red'?'红色':r==='amber'?'黄色':'绿色'}
function riskPill(p){const r=riskLevel(p); return `<span class="pill ${r==='red'?'red':r==='amber'?'amber':'green'}"><span class="dot ${r==='red'?'red':r==='amber'?'amber':'green'}"></span>${riskText(p)}风险</span>`}
function progressClass(p){const r=riskLevel(p); return r==='red'?'red':r==='amber'?'amber':''}
function setTab(tab){
  activeTab = tab;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  const sec = $('sec-'+tab);
  if(sec) sec.classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  const nav = $('nav-'+tab); if(nav) nav.classList.add('active');
  if(tab==='projects') renderProjects();
  if(tab==='detail') renderDetail();
  if(tab==='rules') renderRules();
  if(tab==='prompts') renderPrompts();
  if(tab==='performance') renderPerformance();
  window.scrollTo({top:0,behavior:'smooth'});
}
function selectProject(id, goto='detail'){
  activeProjectId=id; saveState(); renderAll(); setTab(goto);
}
function calcStats(){
  const total=state.projects.length;
  const dueSoon=state.projects.filter(p=>daysUntil(p.nextDue)<=14).length;
  const red=state.projects.filter(p=>riskLevel(p)==='red').length;
  const risk=state.projects.filter(p=>riskLevel(p)!=='green').length;
  const avg=Math.round(state.projects.reduce((a,p)=>a+materialProgress(p),0)/total);
  const missing=state.projects.reduce((a,p)=>a+criticalMissing(p),0);
  return {total,dueSoon,red,risk,avg,missing};
}
function renderHeader(){
  const s=calcStats();
  $('kpiProjects').textContent=s.total; $('kpiTodo').textContent=s.dueSoon; $('kpiRisk').textContent=s.risk; $('kpiProgress').textContent=s.avg+'%';
  $('todayText').textContent='2026-05-14'; $('dashDueSoon').textContent=s.dueSoon; $('dashMissing').textContent=s.missing; $('dashRed').textContent=s.red;
}
function renderDashboard(){
  const list = [...state.projects].sort((a,b)=>{
    const rr={red:0,amber:1,green:2}; const x=rr[riskLevel(a)]-rr[riskLevel(b)]; if(x) return x; return daysUntil(a.nextDue)-daysUntil(b.nextDue);
  }).slice(0,5);
  $('priorityList').innerHTML = list.map(p=>{
    const d=daysUntil(p.nextDue); const miss=criticalMissing(p);
    return `<div class="card flat project-card risk-${riskLevel(p)}" style="margin:9px 0;padding:11px 11px 11px 15px" onclick="selectProject('${p.id}')">
      <div class="between"><div class="project-title">${esc(p.title)}</div>${riskPill(p)}</div>
      <div class="small muted">${esc(p.leadOrg)} · ${esc(p.lead)} · ${stageName(p.stage)}</div>
      <div class="nextbox"><div class="between"><b class="small">下一节点：${esc(p.nextDue)}</b><span class="pill ${d<0?'red':d<=7?'amber':'blue'}">${d<0?'已逾期 '+Math.abs(d)+'天':'剩余 '+d+'天'}</span></div><div class="small muted" style="margin-top:4px">${esc(p.nextAction)}</div>${miss?`<div class="tiny danger" style="margin-top:4px">当前阶段关键材料缺项 ${miss} 项</div>`:''}</div>
    </div>`
  }).join('') || '<div class="empty">暂无待办</div>';
}
function filterOptions(){
  return ['全部','水质安全','管网运营','设施设备','海绵城市','红黄风险'];
}
function renderChips(){
  $('projectChips').innerHTML=filterOptions().map(f=>`<button class="chip ${activeFilter===f?'active':''}" onclick="activeFilter='${f}';renderProjects()">${f}</button>`).join('');
}
function renderProjects(){
  renderChips();
  const q=($('projectSearch')?.value||'').trim().toLowerCase();
  let arr=state.projects.filter(p=>{
    const text=[p.title,p.category,p.leadOrg,p.lead,p.facilitator,p.stage,p.nextAction].join(' ').toLowerCase();
    const okq=!q||text.includes(q);
    const okf=activeFilter==='全部'||(activeFilter==='红黄风险'?riskLevel(p)!=='green':p.category===activeFilter);
    return okq&&okf;
  });

}

    <div class="project-meta"><span>牵头：${esc(p.leadOrg)}</span><span>主编：${esc(p.lead)}</span><span>辅导：${esc(p.facilitator)}</span></div>
    <div class="between small"><span class="bold">${stageName(p.stage)}</span><span class="muted">材料完成 ${pct}%</span></div>

    <div class="nextbox">
      <div class="between"><b class="small">${esc(p.nextDue)}</b><span class="pill ${d<0?'red':d<=14?'amber':'blue'}">${d<0?'逾期'+Math.abs(d)+'天':'剩余'+d+'天'}</span></div>
      <div class="small muted" style="margin-top:4px">${esc(p.nextAction)}</div>
      ${miss?`<div class="tiny danger" style="margin-top:4px">当前阶段关键材料缺项：${miss}项</div>`:`<div class="tiny ok" style="margin-top:4px">当前阶段关键材料基本齐备</div>`}
    </div>
    <div class="actions"><button class="btn primary" onclick="selectProject('${p.id}')">打开详情</button><button class="btn ghost" onclick="selectProject('${p.id}','prompts')">AI辅助</button></div>
  </article>`;
}
function renderDetail(){
  const p=project();
  $('detailRoot').innerHTML=`
    <div class="card">
      <button class="btn smallbtn ghost" onclick="setTab('projects')">← 返回项目</button>
      <div class="between" style="margin-top:10px"><span class="pill gray">${esc(p.category)}</span>${riskPill(p)}</div>

      <div class="small muted">${esc(p.leadOrg)} · 主编 ${esc(p.lead)} · 辅导 ${esc(p.facilitator)}（${esc(p.facilitatorRole)}）</div>

      <div id="detailTab"></div>
    </div>`;

function renderDetailTab(tab){
  const p=project();
  document.querySelectorAll('[id^="det-"]').forEach(b=>b.classList.remove('active'));
  const b=$('det-'+tab); if(b) b.classList.add('active');
  if(tab==='overview'){
    const pct=materialProgress(p), miss=missingRequired(p).length;
    $('detailTab').innerHTML=`<div class="statline"><div class="stat"><b>${pct}%</b><span>材料完成率</span></div><div class="stat"><b>${criticalMissing(p)}</b><span>阶段缺项</span></div><div class="stat"><b>${daysUntil(p.nextDue)}</b><span>节点剩余天</span></div></div>
    <div class="divider"></div>
    <div class="small"><b>管理建议：</b>${adviceForProject(p)}</div>
    <div class="actions"><button class="btn primary" onclick="openSheet('remind')">生成催办</button><button class="btn ghost" onclick="exportProjectText('${p.id}')">导出项目卡</button></div>`;
  }
  if(tab==='nodes'){
    $('detailTab').innerHTML=`<div class="timeline">${STAGES.map(s=>{
      const idx=stageIndex(s.key), cur=stageIndex(p.stage); const cls=idx<cur?'done':idx===cur?'now':'future';
      return `<div class="stage ${cls}"><div class="stage-name">${s.name}</div><div class="stage-tip">${s.tip}</div>${idx===cur?`<div class="tiny warn" style="margin-top:5px">当前节点：${esc(p.nextAction)}</div>`:''}</div>`
    }).join('')}</div>`;
  }
  if(tab==='docs'){
    renderDocFilters();
    renderDocs();
  }
  if(tab==='ai'){
    $('detailTab').innerHTML=`<div class="small muted">围绕当前项目快速复制提示词。</div>${PROMPTS.slice(0,4).map(pr=>promptHTML(pr,p,true)).join('')}`;
  }
}
function renderDocFilters(){
  const filters=['全部',...STAGES.map(s=>s.short)];
  const map=Object.fromEntries(STAGES.map(s=>[s.short,s.key]));
  $('detailTab').innerHTML=`<div class="doc-filter" id="docFilters">${filters.map(f=>`<button class="${docStageFilter===f?'active':''}" onclick="docStageFilter='${f}';renderDetailTab('docs')">${f}</button>`).join('')}</div><div id="docList"></div>`;
}
function renderDocs(){
  const p=project();
  const shortMap=Object.fromEntries(STAGES.map(s=>[s.short,s.key]));
  const stageKey=shortMap[docStageFilter];
  const docs=docsForProject(p).filter(d=>!stageKey||d.stage===stageKey);
  $('docList').innerHTML=`<div class="checklist">${docs.map(d=>`<label class="check"><input type="checkbox" ${d.done?'checked':''} onchange="toggleDoc('${p.id}','${d.id}',this.checked)"><div class="grow"><div class="check-title">${esc(d.name)} ${d.required?'<span class="req">必备</span>':''}</div><div class="check-evi">${stageName(d.stage)}｜${esc(d.evidence)}</div></div></label>`).join('')}</div>`;
}
function toggleDoc(pid, did, checked){
  const p=state.projects.find(x=>x.id===pid); if(!p)return;
  const set=new Set(p.docsDone||[]); checked?set.add(did):set.delete(did); p.docsDone=[...set]; saveState(); renderAll(false);
  if(activeTab==='detail') renderDetailTab('docs');
}
function adviceForProject(p){
  const r=riskLevel(p); const miss=criticalMissing(p); const pct=materialProgress(p);
  if(r==='red') return `建议由工作组发起升级协调，优先补齐当前阶段 ${miss} 项关键材料，并同步形成书面催办和风险记录。`;
  if(r==='amber') return `建议本周完成“${p.nextAction}”，同时补齐缺项材料，避免进入专家审查前集中返工。`;
  if(pct<70) return `建议按材料清单做一次全量体检，把应用证明、查新查重、会议纪要和意见处理表提前归档。`;
  return `项目推进状态较好，可准备进入下一阶段，同时同步沉淀绩效佐证和宣贯应用证据。`;
}
function evaluateRule(p, rule){
  const cur=stageIndex(p.stage), rStage=stageIndex(rule.stage);
  const missing=rule.checkDocs.filter(id=>!(p.docsDone||[]).includes(id));
  if(cur<rStage) return {state:'wait', label:'未到阶段', missing};
  if(missing.length===0) return {state:'pass', label:'已满足', missing};
  return {state:rule.severity==='红'?'fail':'warn', label:rule.severity==='红'?'风险':'待补充', missing};
}
function renderRules(){
  const p=project();
  $('rulesProjectMini').innerHTML=`<div class="project-title">${esc(p.title)}</div><div class="small muted">${stageName(p.stage)} · ${esc(p.leadOrg)} · ${riskText(p)}风险</div>`;
  $('ruleList').innerHTML=RULES.map(rule=>{
    const ev=evaluateRule(p,rule); const cls=ev.state==='pass'?'pass':ev.state==='fail'?'fail':ev.state==='warn'?'warn':'';
    const missNames=ev.missing.map(id=>docById(id)?.name || id).join('；');
    return `<div class="rule ${cls}"><div class="rule-title"><span class="pill ${ev.state==='pass'?'green':ev.state==='fail'?'red':ev.state==='warn'?'amber':'gray'}">${ev.label}</span><span>${rule.id} ${esc(rule.name)}</span></div><div class="rule-body">依据：${esc(rule.basis)}</div>${ev.missing.length?`<div class="rule-body danger">缺项：${esc(missNames)}</div>`:''}</div>`
  }).join('');
}
function renderPromptFilters(){
  const roles=['全部',...Array.from(new Set(PROMPTS.map(p=>p.role)))];
  $('promptFilters').innerHTML=roles.map(r=>`<button class="${promptRoleFilter===r?'active':''}" onclick="promptRoleFilter='${r}';renderPrompts()">${r}</button>`).join('');
}
function fillPrompt(tpl,p){
  return tpl.replace(/{{title}}/g,p.title).replace(/{{leadOrg}}/g,p.leadOrg).replace(/{{lead}}/g,p.lead).replace(/{{stageName}}/g,stageName(p.stage)).replace(/{{nextDue}}/g,p.nextDue).replace(/{{nextAction}}/g,p.nextAction);
}
function promptHTML(pr,p,compact=false){
  const body=fillPrompt(pr.body,p);
  return `<div class="prompt"><div class="between"><div><div class="h3">${esc(pr.title)}</div><span class="role-badge">${esc(pr.role)}｜${esc(pr.stage)}</span></div><button class="btn smallbtn primary" onclick="copyText(${JSON.stringify(body)})">复制</button></div>${compact?'':`<div class="body">${esc(body)}</div>`}</div>`;
}
function renderPrompts(){
  renderPromptFilters(); const p=project();
  const arr=PROMPTS.filter(pr=>promptRoleFilter==='全部'||pr.role===promptRoleFilter);
  $('promptList').innerHTML=`<div class="card flat"><div class="small muted">当前项目：<b>${esc(p.title)}</b></div></div>`+arr.map(pr=>promptHTML(pr,p)).join('');
}
function performanceMetrics(p){
  const cats=[
    {name:'组织管理', docs:['A01','B01','B02','B03']},
    {name:'过程规范', docs:['A03','D02','D03','E01','F02','F04','G04']},
    {name:'技术质量', docs:['C01','C02','C03','C04','E03','F01']},
    {name:'应用推广', docs:['A04','H01','H02','H03']},
  ];
  return cats.map(c=>{const done=c.docs.filter(id=>(p.docsDone||[]).includes(id)).length; return {...c, done,total:c.docs.length,pct:Math.round(done/c.docs.length*100)}});
}
function renderPerformance(){
  const p=project(); const metrics=performanceMetrics(p);
  $('perfGrid').innerHTML=metrics.map(m=>`<div class="perf"><div class="between"><span class="h3">${m.name}</span><b>${m.pct}%</b></div><div class="progress"><div class="bar ${m.pct<50?'red':m.pct<75?'amber':''}" style="width:${m.pct}%"></div></div><div class="tiny muted" style="margin-top:6px">完成 ${m.done}/${m.total} 项证据</div></div>`).join('');
  const weak=metrics.sort((a,b)=>a.pct-b.pct)[0];
  $('evidenceAdvice').innerHTML=`当前项目：<b>${esc(p.title)}</b><br>最需补强：<b class="warn">${weak.name}</b>。建议围绕“${esc(p.nextAction)}”同步归档会议纪要、应用证明、平台截图和实施反馈，避免年底绩效自评时补证据。`;
}

async function copyText(text){
  try{ await navigator.clipboard.writeText(text); toast('已复制'); }
  catch(e){ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); toast('已复制'); }
}
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1600); }
function dailyBriefText(){
  const top=[...state.projects].sort((a,b)=>daysUntil(a.nextDue)-daysUntil(b.nextDue)).slice(0,5);

}
function copyDailyBrief(){copyText(dailyBriefText())}

function exportSnapshot(){
  const payload={app:'JSWA团标工作组移动端HTML版', date:'2026-05-14', activeProjectId, projects:state.projects.map(p=>({...p, progress:materialProgress(p), risk:riskText(p), missing:missingRequired(p).map(d=>d.name)}))};

function downloadFile(name, content, type){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),500); toast('已生成下载文件');
}
function resetDemo(){ localStorage.removeItem(STORAGE_KEY); state=loadState(); activeProjectId=state.activeProjectId; renderAll(); toast('已重置') }
function renderAll(includeDetail=true){renderHeader();renderDashboard(); if($('projectList')) renderProjects(); if(includeDetail && activeTab==='detail') renderDetail(); if(activeTab==='rules') renderRules(); if(activeTab==='prompts') renderPrompts(); if(activeTab==='performance') renderPerformance();}
window.addEventListener('load',()=>{renderAll();});
</script>
